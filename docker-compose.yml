version: "3.9"

services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: tara-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tara_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (sessions + caching)
  redis:
    image: redis:7-alpine
    container_name: tara-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tara-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-tara_secret_2024}@db:5432/tara?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      BCRYPT_ROUNDS: 12
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"

  # Frontend (production build served by nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tara-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: zenvix
      POSTGRES_PASSWORD: zenvix_dev_password
      POSTGRES_DB: zenvix_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      # These will be provided by Railway/Docker if not set here
      # DATABASE_URL is only needed for 'db' mode
      - NODE_ENV=production
      - PERSISTENCE_MODE=mock
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

# ==============================================================================
# TARA — Development Docker Compose
#
# Only database + redis. The app runs natively for hot-reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd backend && npx prisma migrate deploy && npm run start:dev
#   npm run dev:frontend  (in root)
# ==============================================================================
version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: tara-db-dev
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tara"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tara-redis-dev
    ports:
      - "6379:6379"

volumes:
  pgdata_dev:
